services:
  calivi-backend:
    build: ./backend
    container_name: calivi-backend
    restart: unless-stopped
    depends_on:
      - calivi-searxng
    environment:
      - DB_PATH=/data/calivi.db
      - SYSTEM_PROMPTS_PATH=/config/system_prompts.yml
      - SEARCH_CONFIG_PATH=/config/search.yml
      - TOOLS_CONFIG_PATH=/config/tools.yml
      - SEARXNG_URL=http://calivi-searxng:8080
      # Signs the session cookies AND encrypts the secrets stored in the database (MCP
      # tokens, provider API keys). Left unset, the backend generates and persists
      # /data/secret_key — inside the same volume as calivi.db, so a copy of that volume (a
      # backup, for instance) carries both the data and the key that authenticates access to
      # it, and anyone holding it can mint a session for any user and read every stored
      # credential. Set it here, from the host's .env, and the volume stops being
      # self-sufficient.
      # Generate once with:  openssl rand -hex 32
      # Changing it later: pass the previous value as CALIVI_SECRET_KEY_OLD for one boot,
      # or the stored secrets have to be re-entered. See README.
      - CALIVI_SECRET_KEY=${CALIVI_SECRET_KEY:-}
      - CALIVI_SECRET_KEY_OLD=${CALIVI_SECRET_KEY_OLD:-}
      # The Secure flag on the session cookie. This compose file serves plain HTTP (:8090),
      # so the default is false: with true the browser would not send the cookie over a
      # non-HTTPS connection and login would fail silently (the classic "works on localhost,
      # not from the LAN IP" trap). If you put this behind a TLS-terminating reverse proxy,
      # you MUST set it: COOKIE_SECURE=true
      - COOKIE_SECURE=${COOKIE_SECURE:-false}
    volumes:
      - calivi-data:/data
      - ./config:/config

  # Bundled metasearch — the engine behind Calivi's web search (🔍). No port is published;
  # only calivi-backend reaches it, over the compose network at http://calivi-searxng:8080.
  calivi-searxng:
    image: searxng/searxng:latest
    container_name: calivi-searxng
    restart: unless-stopped
    volumes:
      - ./searxng:/etc/searxng

  calivi-frontend:
    build: ./frontend
    container_name: calivi-frontend
    restart: unless-stopped
    depends_on:
      - calivi-backend
    ports:
      - "${CALIVI_PORT:-8090}:80"

volumes:
  calivi-data:
