<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calivi</title>
    <!-- Same mark as the calivi.ai landing page (docs/index.html). Inlined as a data URI so the
         tab icon is there on first paint with no extra request; the CSP allows `img-src data:`. -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%233584e4'/%3E%3Ccircle cx='16' cy='16' r='6' fill='white'/%3E%3C/svg%3E" />
    <!-- Theme: set data-theme before React mounts (prevents a flash). Falls back to the
         system preference when localStorage is empty.
         NOTE: the content of the script element below is pinned by a sha256 in the CSP
         (frontend/nginx.conf). Editing that script REQUIRES recomputing the hash;
         this comment sits outside the element and does not affect it. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("calivi_theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
          var a = localStorage.getItem("calivi_accent");
          var accents = ["blue","teal","green","yellow","orange","red","pink","purple","slate"];
          document.documentElement.setAttribute("data-accent", accents.indexOf(a) >= 0 ? a : "blue");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "dark");
          document.documentElement.setAttribute("data-accent", "blue");
        }
      })();
    </script>
  </head>
  <body class="bg-neutral-950 text-neutral-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
